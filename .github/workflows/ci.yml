name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade ruff

      - name: Run ruff
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.py' ':!:node_modules/**' ':!:public/**' ':!:bin/**' ':!:data/**')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files tracked; ruff check skipped."
            exit 0
          fi
          ruff check "${files[@]}"

  go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test ./...

  frontend-and-smoke:
    name: Frontend Build And Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build smoke binary
        working-directory: backend
        run: go build -o ../bin/sapi-smoke .

      - name: Smoke test full request path
        run: npm run smoke
